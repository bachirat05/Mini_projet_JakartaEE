<!DOCTYPE html>
<html lang="fr"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:a="http://xmlns.jcp.org/jsf/passthrough"> <h:head>
   <meta charset="UTF-8"/>
   <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
   <title>SchoolSwap - Accueil</title>

   <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&amp;family=Mulish:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

   <h:outputStylesheet name="css/style2.css"/>
   <script src="https://cdn.tailwindcss.com"></script>
</h:head>

<h:body>
   <div style="display:flex;min-height:100vh;width:100%;">

      <ui:include src="./_sidebar.xhtml"/>

      <main class="main">

         <div class="page-header" style="justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1.5rem;">
            <h2 class="page-title">
               <i class="fa-solid fa-store" style="color: var(--accent);"></i> Les articles
            </h2>

            <div style="display: flex; gap: 1.5rem; align-items: center;">
               <div style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                  <span style="font-weight: 600; font-size: 0.9rem; color: var(--text-muted);">Fatima-Ezzahra</span>
                  <img src="https://ui-avatars.com/api/?name=Fatima+Ezzahra&amp;background=2563eb&amp;color=fff" alt="Profile" style="height: 38px; width: 38px; border-radius: 10px; box-shadow: var(--shadow-sm);" />
               </div>

               <a href="gestion-annonce.xhtml" class="btn-add">
                  <i class="fa-solid fa-plus"></i> Ajouter une annonce
               </a>
            </div>
         </div>

         <h:form id="contentForm">

            <div class="filters-bar">

               <div class="search-wrap">
                  <span class="search-ico">🔍</span>
                  <h:inputText value="#{accueilBean.motCle}" class="input-search" a:placeholder="Rechercher un article ou une ville..." />
               </div>

               <h:selectOneMenu value="#{accueilBean.categorieFiltre}" class="select-filter">
                  <f:selectItem itemValue="Tous" itemLabel="📂 Toutes les catégories" />
                  <f:selectItems value="#{accueilBean.categories}" var="cat" itemValue="#{cat.nom}" itemLabel="#{cat.nom}" />

                  <f:ajax event="change" listener="#{accueilBean.filtrerAjax}" render="gridContainer" />
               </h:selectOneMenu>

               <h:commandButton action="#{accueilBean.filtrerAjax}" value="🔍 Rechercher" class="btn-filter">
                  <f:ajax execute="@form" render="gridContainer" />
               </h:commandButton>

            </div>

            <h:panelGroup id="gridContainer" layout="block">

               <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                  <ui:repeat value="#{accueilBean.annonces}" var="annonce">
                     <a href="details.xhtml?id=#{annonce.id}" class="block h-full cursor-pointer" style="text-decoration: none;">

                        <div class="bg-white rounded-2xl border overflow-hidden relative group transition-all duration-300 flex flex-col h-full" style="border-color: var(--border); box-shadow: var(--shadow-sm);">

                           <button type="button" class="absolute top-3 right-3 z-20 bg-white/80 backdrop-blur-sm p-2 rounded-full text-gray-400 hover:text-red-500 hover:bg-white transition-colors shadow-sm">
                              <i class="fa-regular fa-heart"></i>
                           </button>

                           <div class="h-48 w-full bg-gray-100 overflow-hidden relative">
                              <img src="https://placehold.co/600x400/f8fafc/64748b?text=Image+Article" alt="#{annonce.titre}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />

                              <div class="absolute bottom-3 left-3 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider shadow-sm
                                                    #{annonce.etat == 'Neuf' ? 'bg-green-100 text-green-700 border border-green-200' :
                                                      (annonce.etat == 'Bon_Etat' ? 'bg-orange-100 text-orange-700 border border-orange-200' : 'bg-red-100 text-red-700 border border-red-200')}">
                                 #{annonce.etat}
                              </div>
                           </div>

                           <div class="p-5 flex flex-col flex-grow">
                              <h3 class="font-bold text-lg mb-1 line-clamp-1" style="color: var(--text);">#{annonce.titre}</h3>

                              <div class="text-xl font-black mb-3" style="color: var(--accent);">
                                 <h:outputText value="#{annonce.prix}">
                                    <f:convertNumber pattern="#,##0.00"/>
                                 </h:outputText>
                                 <span class="text-sm font-bold">DH</span>
                              </div>

                              <p class="text-sm line-clamp-2 mb-4 flex-grow" style="color: var(--text-muted);">#{annonce.description}</p>

                              <div class="flex justify-between items-center pt-4 text-xs font-medium" style="border-top: 1px solid var(--border); color: var(--text-muted);">
                                 <div class="flex items-center">
                                    <i class="fa-solid fa-location-dot mr-1" style="color: var(--text-light);"></i>#{annonce.ville}
                                 </div>
                                 <div class="flex items-center px-2 py-1 rounded" style="background: var(--page-bg); color: var(--accent);">
                                    <i class="fa-solid fa-tag mr-1"></i>#{annonce.idCat.nom}
                                 </div>
                              </div>
                           </div>

                        </div>
                     </a>
                  </ui:repeat>
               </div>

               <h:panelGroup rendered="#{empty accueilBean.annonces}">
                  <div class="empty-cell" style="margin-top: 3rem;">
                     <div class="empty-ico">🔍</div>
                     <div class="empty-ttl">Aucun article trouvé</div>
                     <div>Essayez de modifier vos mots-clés ou vos filtres.</div>
                  </div>
               </h:panelGroup>

            </h:panelGroup>
         </h:form>

      </main>
   </div>
</h:body>
</html>
