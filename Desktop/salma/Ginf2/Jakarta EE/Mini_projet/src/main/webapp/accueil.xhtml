<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
<h:head>
   <title>SchoolSwap - Accueil</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</h:head>

<h:body class="bg-gray-50 font-sans text-gray-800 h-screen flex overflow-hidden">

   <aside class="w-64 bg-white shadow-xl flex flex-col justify-between hidden md:flex">
      <div>
         <div class="h-20 flex items-center justify-center border-b border-gray-100">
            <h1 class="text-2xl font-black text-blue-600 tracking-wider">
               <i class="fa-solid fa-graduation-cap mr-2"></i>SchoolSwap
            </h1>
         </div>
         <nav class="mt-6 px-4 space-y-2">
            <a href="accueil.xhtml" class="flex items-center px-4 py-3 bg-blue-600 text-white shadow-md shadow-blue-200 rounded-xl transition-colors">
               <i class="fa-solid fa-house w-6"></i>
               <span class="font-medium">Accueil</span>
            </a>
            <a href="#" class="flex items-center px-4 py-3 text-gray-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-colors">
               <i class="fa-solid fa-list w-6"></i>
               <span class="font-medium">Mes annonces</span>
            </a>
            <a href="#" class="flex items-center px-4 py-3 text-gray-500 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-colors">
               <i class="fa-solid fa-user w-6"></i>
               <span class="font-medium">Mon profil</span>
            </a>
         </nav>
      </div>
      <div class="p-4 border-t border-gray-100">
         <a href="#" class="flex items-center px-4 py-3 text-red-500 hover:bg-red-50 rounded-xl transition-colors">
            <i class="fa-solid fa-arrow-right-from-bracket w-6"></i>
            <span class="font-medium">Déconnexion</span>
         </a>
      </div>
   </aside>

   <main class="flex-1 flex flex-col h-screen overflow-y-auto">

      <header class="h-20 bg-white shadow-sm flex items-center justify-between px-8 z-10 sticky top-0">

         <div class="relative w-96 hidden md:block">
            <h:form class="w-full">
               <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
               <h:inputText value="#{accueilBean.motCle}" placeholder="Rechercher un article..." class="w-full bg-gray-50 text-gray-700 rounded-full py-2 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" />
               <h:commandButton action="#{accueilBean.filtrer}" style="display: none;" />
            </h:form>
         </div>

         <div class="flex items-center space-x-6">
            <div class="flex items-center space-x-3 cursor-pointer hover:opacity-80 transition-opacity">
               <span class="font-medium text-gray-600 text-sm hidden md:block">Fatima-Ezzahra</span>
               <img src="https://ui-avatars.com/api/?name=Fatima+Ezzahra&amp;background=2563eb&amp;color=fff" alt="Profile" class="h-10 w-10 rounded-full border-2 border-blue-100" />
            </div>
         </div>
      </header>

      <div class="p-8">

         <h:form id="contentForm">

            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 space-y-4 md:space-y-0">
               <div>
                  <h2 class="text-2xl font-bold text-gray-800">Les articles</h2>
                  <div class="h-1 w-12 bg-blue-600 rounded-full mt-2"></div>
               </div>

               <div class="flex space-x-4">

                  <h:selectOneMenu value="#{accueilBean.categorieFiltre}" class="bg-white border border-gray-200 text-gray-700 py-2 px-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm cursor-pointer">

                     <f:selectItem itemValue="Tous" itemLabel="Toutes les catégories" />

                     <f:selectItems value="#{accueilBean.categories}" var="cat" itemValue="#{cat.nom}" itemLabel="#{cat.nom}" />

                     <f:ajax event="change" listener="#{accueilBean.filtrerAjax}" render="gridContainer" />
                  </h:selectOneMenu>

                  <button type="button" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-5 rounded-lg shadow-md shadow-blue-200 font-medium transition-all flex items-center">
                     <i class="fa-solid fa-plus mr-2"></i> Ajouter Un article
                  </button>
               </div>
            </div>

            <h:panelGroup id="gridContainer" layout="block">

               <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                  <ui:repeat value="#{accueilBean.annonces}" var="annonce">
                     <a href="details.xhtml?id=#{annonce.id}" class="block h-full cursor-pointer">
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden relative group hover:shadow-lg transition-all duration-300 flex flex-col h-full">

                           <button type="button" class="absolute top-3 right-3 z-20 bg-white/80 backdrop-blur-sm p-2 rounded-full text-gray-400 hover:text-red-500 hover:bg-white transition-colors shadow-sm">
                              <i class="fa-regular fa-heart"></i>
                           </button>

                           <div class="h-48 w-full bg-gray-100 overflow-hidden relative">
                              <img src="https://placehold.co/600x400/f8fafc/64748b?text=Image+Article" alt="#{annonce.titre}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                              <div class="absolute bottom-3 left-3 bg-blue-600 text-white text-[10px] font-bold px-2 py-1 rounded shadow-sm uppercase tracking-wider">
                                 #{annonce.etat}
                              </div>
                           </div>

                           <div class="p-5 flex flex-col flex-grow">
                              <h3 class="font-bold text-gray-800 text-lg mb-1 line-clamp-1">#{annonce.titre}</h3>
                              <div class="text-xl font-black text-blue-600 mb-3">#{annonce.prix} <span class="text-sm font-bold">DH</span></div>
                              <p class="text-sm text-gray-500 line-clamp-2 mb-4 flex-grow">#{annonce.description}</p>
                              <div class="flex justify-between items-center pt-4 border-t border-gray-100 text-xs font-medium text-gray-400">
                                 <div class="flex items-center"><i class="fa-solid fa-location-dot mr-1 text-gray-300"></i>#{annonce.ville}</div>
                                 <div class="flex items-center bg-gray-50 px-2 py-1 rounded"><i class="fa-solid fa-tag mr-1 text-blue-400"></i>#{annonce.idCat.nom}</div>
                              </div>
                           </div>

                        </div>
                     </a>
                  </ui:repeat>
               </div>

               <h:panelGroup rendered="#{empty accueilBean.annonces}">
                  <div class="flex flex-col items-center justify-center py-12">
                     <i class="fa-regular fa-folder-open text-6xl text-gray-200 mb-4"></i>
                     <p class="text-gray-500 font-medium text-lg">Aucun résultat pour cette recherche.</p>
                  </div>
               </h:panelGroup>

            </h:panelGroup>
         </h:form>

      </div>
   </main>

</h:body>
</html>
