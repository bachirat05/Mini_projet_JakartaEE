      <!-- Main -->
      <main class="main">

         <!-- Breadcrumb -->
         <nav class="breadcrumb">
            <h:link outcome="mes-annonces.xhtml" value="Mes Annonces" />
            <span>›</span>
            <span>#{annoncesBean.modeEdition ? 'Modifier l\'annonce' : 'Nouvelle annonce'}</span>
         </nav>

         <!-- Header -->
         <div class="page-header">
            <h1 class="page-title">
               #{annoncesBean.modeEdition ? 'Modifier l\'annonce' : 'Publier une annonce'}
               <h:panelGroup rendered="#{annoncesBean.modeEdition}">
                  <span class="mode-badge badge-edit">✏ Édition</span>
               </h:panelGroup>
               <h:panelGroup rendered="#{not annoncesBean.modeEdition}">
                  <span class="mode-badge badge-new">+ Nouveau</span>
               </h:panelGroup>
            </h1>
         </div>

         <!-- Erreurs -->
         <h:messages globalOnly="true" errorClass="flash-err" infoClass="flash-err" />

         <!-- Formulaire -->
         <div class="form-card">
            <h:form>

               <p class="section-label">Informations générales</p>

               <!-- Titre -->
               <div class="field">
                  <label>Titre <span class="req">*</span> <span class="hint">ex : Livre de Maths Sup – Tome 1</span></label>
                  <h:inputText value="#{annoncesBean.articleCourant.titre}" required="true" requiredMessage="Le titre est requis" maxlength="200" a:placeholder="Décrivez brièvement votre article" />
               </div>

               <!-- Catégorie + État -->
               <div class="field-row">
                  <!-- Catégorie -->
                  <div class="field">
                     <label>Catégorie <span class="req">*</span></label>
                     <div class="select-wrap">
                        <h:selectOneMenu value="#{annoncesBean.selectedCategoryId}" required="true" requiredMessage="Veuillez choisir une catégorie">
                           <f:selectItem itemValue="" itemLabel="-- Choisir --" />
                           <f:selectItems value="#{annoncesBean.categories}" var="cat" itemValue="#{cat.id}" itemLabel="#{cat.nom}" />
                        </h:selectOneMenu>
                     </div>
                  </div>

                  <!-- État -->
                  <div class="field">
                     <label>État <span class="req">*</span></label>
                     <div class="select-wrap">
                        <h:selectOneMenu value="#{annoncesBean.selectedEtatName}" required="true" requiredMessage="Veuillez choisir l'état">
                           <f:selectItem itemValue="" itemLabel="-- Choisir --" />
                           <f:selectItem itemValue="Neuf" itemLabel="Neuf" />
                           <f:selectItem itemValue="Bon_Etat" itemLabel="Bon état" />
                           <f:selectItem itemValue="Ancien_Usage" itemLabel="Usé" />
                        </h:selectOneMenu>
                     </div>
                  </div>
               </div>

               <!-- Description -->
               <div class="field">
                  <label>Description <span class="req">*</span></label>
                  <h:inputTextarea value="#{annoncesBean.articleCourant.description}" required="true" requiredMessage="La description est requise" a:placeholder="État précis, édition, défauts éventuels..." />
               </div>

               <p class="section-label" style="margin-top:1.5rem;">Prix &amp; Localisation</p>

               <div class="field-row">
                  <!-- Prix -->
                  <div class="field">
                     <label>Prix <span class="req">*</span> <span class="hint">DH</span></label>
                     <!-- type="number" via pt:type -->
                     <h:inputText value="#{annoncesBean.articleCourant.prix}" required="true" requiredMessage="Le prix est requis" a:type="number" a:step="0.01" a:min="0" />
                  </div>

                  <!-- Ville -->
                  <div class="field">
                     <label>Ville <span class="req">*</span></label>
                     <h:inputText value="#{annoncesBean.articleCourant.ville}" required="true" requiredMessage="La ville est requise" a:placeholder="ex : Casablanca" />
                  </div>
               </div>

               <!-- Actions -->
               <div class="form-actions">
                  <h:link outcome="mes-annonces.xhtml" class="btn-cancel" value="Annuler" />
                  <h:commandButton action="#{annoncesBean.sauvegarder}" value="#{annoncesBean.modeEdition ? '💾 Enregistrer les modifications' : '🚀 Publier l\'annonce'}" class="btn-submit" />
               </div>

            </h:form>
         </div>

      </main>
