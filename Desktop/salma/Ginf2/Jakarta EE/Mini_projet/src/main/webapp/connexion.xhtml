<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<f:view>
    <h:head>
        <title>Connexion — SchoolSwap</title>
        <link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/css/style.css" />
    </h:head>

    <h:body>

        <div class="navbar">
            <a href="accueil.xhtml" class="navbar-logo">School<span>Swap</span></a>
            <span class="navbar-link">Pas encore de compte ?
                <a href="inscription.xhtml" style="color:white; font-weight:700; margin-left:4px;">S'inscrire</a>
            </span>
        </div>

        <div class="page-center">
            <div class="card">

                <span class="card-logo">School<span>Swap</span></span>
                <p class="card-tagline">Connecte-toi à ton espace étudiant</p>

                <h:form>

                    <div class="field">
                        <label for="email">Adresse email</label>
                        <h:inputText
                                id="email"
                                value="#{loginBean.email}"
                                required="true"
                                requiredMessage="L'email est obligatoire"
                                placeholder="ton.email@etu.univ.ma" />
                        <h:message for="email" styleClass="message-error" />
                    </div>

                    <div class="field">
                        <label for="password">Mot de passe</label>
                        <h:inputSecret
                                id="password"
                                value="#{loginBean.password}"
                                required="true"
                                requiredMessage="Le mot de passe est obligatoire"
                                placeholder="••••••••" />
                        <h:message for="password" styleClass="message-error" />
                    </div>


                    <!-- Message général du bean (identifiants incorrects) -->
                    <h:outputText
                            value="#{loginBean.message}"
                            styleClass="message-error"
                            rendered="#{not empty loginBean.message}" />

                    <h:commandButton
                            value="Se connecter"
                            action="#{loginBean.login}"
                            styleClass="btn-submit" />

                </h:form>

                <div class="divider"><span>ou</span></div>

                <div class="bottom-links">
                    Pas encore de compte ? <a href="inscription.xhtml">S'inscrire</a>
                </div>

            </div>
        </div>

    </h:body>
</f:view>
</html>
